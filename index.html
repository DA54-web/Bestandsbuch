<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@500;700&family=Source+Sans+3:wght@400;500;600;700&display=swap');

  :root{
    --ink:#232620;
    --paper:#F6F6F1;
    --paper-2:#EDEDE4;
    --green-deep:#35472E;
    --green-mid:#6B8552;
    --green-pale:#E4EADB;
    --rust:#9C4A2E;
    --rust-pale:#F0DCD3;
    --gold:#B8923F;
    --line:#D8D6CC;
    --white:#FFFFFF;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;padding:0;background:transparent;}

  .bb-app{ font-size:24px; line-height:1.5; }

  .bb-app{
    font-family:'Source Sans 3', system-ui, sans-serif;
    color:var(--ink);
    background:var(--paper);
    max-width:900px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    border-left:1px solid var(--line);
    border-right:1px solid var(--line);
  }

  .bb-header{
    padding:calc(20px + env(safe-area-inset-top)) 20px 16px;
    border-bottom:2px solid var(--green-deep);
    background:var(--paper);
    position:relative;
  }
  .bb-eyebrow{
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--green-mid);
    font-weight:600;
    margin-bottom:4px;
  }
  .bb-title{
    font-family:'Roboto Slab', serif;
    font-weight:700;
    font-size:40px;
    color:var(--green-deep);
    margin:0;
    letter-spacing:-.01em;
  }
  .bb-stamp{
    position:absolute;
    top:18px;
    right:20px;
    text-align:right;
    font-size:11px;
    color:var(--green-mid);
    border:1px solid var(--green-mid);
    border-radius:3px;
    padding:5px 9px;
    line-height:1.3;
    transform:rotate(2deg);
  }
  .bb-stamp b{display:block;color:var(--green-deep);font-size:12px;}

  .bb-backup-bar{
    margin-top:10px;
    padding:9px 11px;
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:6px;
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
    font-size:12px;
    color:var(--ink);
  }
  .bb-dot{width:8px;height:8px;border-radius:50%;background:var(--green-mid);display:inline-block;flex-shrink:0;}
  .bb-dot.err{background:var(--rust);}
  .bb-backup-btns{display:flex;gap:6px;margin-left:auto;}
  .bb-backup-btns button{
    border:1px solid var(--green-deep);
    background:var(--white);
    color:var(--green-deep);
    font-weight:700;
    font-size:12.5px;
    padding:9px 14px;
    min-height:40px;
    border-radius:5px;
    cursor:pointer;
    font-family:inherit;
    touch-action:manipulation;
    user-select:none;
  }
  .bb-backup-btns button.primary{background:var(--green-deep);color:var(--paper);}

  .bb-content{
    flex:1;
    padding:18px 20px calc(100px + env(safe-area-inset-bottom));
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
  }

  .bb-section-title{
    font-family:'Roboto Slab', serif;
    font-size:27px;
    font-weight:700;
    color:var(--green-deep);
    margin:0 0 16px;
  }

  .bb-tabbar{
    position:sticky;
    bottom:0;
    left:0;
    right:0;
    display:flex;
    background:var(--white);
    border-top:1px solid var(--line);
    box-shadow:0 -4px 14px rgba(0,0,0,.06);
    max-width:900px;
    margin:0 auto;
    z-index:20;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .bb-tab{
    flex:1;
    border:none;
    background:none;
    padding:15px 4px 13px;
    min-height:76px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:5px;
    cursor:pointer;
    color:#9a998c;
    font-family:'Source Sans 3', sans-serif;
    font-size:16px;
    font-weight:700;
    border-top:2px solid transparent;
    transition:color .15s ease, background-color .15s ease;
    touch-action:manipulation;
    user-select:none;
  }
  .bb-tab:active{background:var(--paper-2);}
  .bb-tab svg{width:32px;height:32px;stroke:currentColor;fill:none;stroke-width:1.8;}
  .bb-tab.active{color:var(--green-deep);border-top-color:var(--green-deep);background:var(--green-pale);}

  .bb-farm-card{
    background:var(--white);
    border:1px solid var(--line);
    border-radius:8px;
    margin-bottom:14px;
    overflow:hidden;
  }
  .bb-farm-card-head{
    background:var(--green-deep);
    color:var(--paper);
    padding:15px 17px;
    font-weight:700;
    font-family:'Roboto Slab', serif;
    font-size:22px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .bb-farm-total{font-size:16px;font-weight:500;opacity:.85;}
  .bb-cat-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
    gap:1px;
    background:var(--line);
  }
  .bb-cat-cell{
    padding:16px 14px;
    background:var(--white);
  }
  .bb-cat-label{font-size:12.5px;color:#8a8a7d;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
  .bb-cat-value{font-family:'Roboto Slab', serif;font-size:44px;font-weight:700;color:var(--ink);}

  .bb-empty{
    text-align:center;
    padding:40px 20px;
    color:#8a8a7d;
    font-size:14px;
  }

  .bb-form{
    background:var(--white);
    border:1px solid var(--line);
    border-radius:8px;
    padding:16px;
  }
  .bb-field{margin-bottom:16px;}
  .bb-field label{
    display:block;
    font-size:13px;
    font-weight:700;
    color:var(--green-deep);
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:.04em;
  }
  .bb-field select, .bb-field input, .bb-field textarea{
    width:100%;
    padding:16px 15px;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:22px;
    font-family:inherit;
    background:var(--paper);
    color:var(--ink);
    min-height:62px;
  }
  .bb-field select:focus, .bb-field input:focus, .bb-field textarea:focus{
    outline:2px solid var(--green-mid);
    outline-offset:1px;
    background:var(--white);
  }
  .bb-row2{display:grid;grid-template-columns:1fr;gap:12px;}
  @media (min-width:640px){
    .bb-row2{grid-template-columns:1fr 1fr;}
  }

  .bb-type-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:9px;margin-bottom:16px;}
  .bb-type-btn{
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:7px;
    padding:18px 6px;
    min-height:64px;
    font-size:17px;
    font-weight:700;
    text-align:center;
    cursor:pointer;
    color:#5b5b50;
    touch-action:manipulation;
    user-select:none;
    transition:transform .08s ease;
  }
  .bb-type-btn:active{transform:scale(.96);}
  .bb-type-btn.pos{border-color:var(--green-mid);}
  .bb-type-btn.neg{border-color:var(--rust);}
  .bb-type-btn.active.pos{background:var(--green-pale);color:var(--green-deep);border-color:var(--green-deep);}
  .bb-type-btn.active.neg{background:var(--rust-pale);color:var(--rust);border-color:var(--rust);}

  .bb-btn{
    display:inline-block;
    background:var(--green-deep);
    color:var(--paper);
    border:none;
    padding:18px 22px;
    min-height:64px;
    border-radius:8px;
    font-weight:700;
    font-size:21px;
    cursor:pointer;
    font-family:inherit;
    touch-action:manipulation;
    user-select:none;
    transition:transform .08s ease;
  }
  .bb-btn:active{transform:scale(.97);}
  .bb-btn:hover{background:#2a3824;}
  .bb-btn.secondary{
    background:var(--white);
    color:var(--green-deep);
    border:1px solid var(--green-deep);
  }
  .bb-btn.small{padding:8px 12px;font-size:13px;min-height:40px;}
  .bb-btn:disabled{opacity:.5;cursor:not-allowed;}

  .bb-stepper{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .bb-stepper-btn{
    width:68px;
    height:68px;
    flex-shrink:0;
    border-radius:10px;
    border:1px solid var(--green-deep);
    background:var(--white);
    color:var(--green-deep);
    font-size:34px;
    font-weight:700;
    line-height:1;
    cursor:pointer;
    touch-action:manipulation;
    user-select:none;
    transition:transform .08s ease, background-color .08s ease;
  }
  .bb-stepper-btn:active{transform:scale(.94);background:var(--green-pale);}
  .bb-stepper-value{
    flex:1;
    text-align:center;
    font-family:'Roboto Slab', serif;
    font-size:40px;
    font-weight:700;
    color:var(--ink);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 6px;
    min-height:68px;
    background:var(--paper);
    -moz-appearance:textfield;
  }
  .bb-stepper-value::-webkit-inner-spin-button, .bb-stepper-value::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
  .bb-chip-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .bb-chip{
    border:1px solid var(--line);
    background:var(--white);
    color:#5b5b50;
    border-radius:18px;
    padding:11px 20px;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    touch-action:manipulation;
    user-select:none;
    min-height:40px;
  }
  .bb-chip:active{background:var(--paper-2);}


  .bb-msg{
    padding:9px 12px;
    border-radius:6px;
    font-size:13px;
    margin-bottom:12px;
  }
  .bb-msg.ok{background:var(--green-pale);color:var(--green-deep);}
  .bb-msg.err{background:var(--rust-pale);color:var(--rust);}

  .bb-filters{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:12px;
  }
  .bb-filters select, .bb-filters input{
    padding:7px 9px;
    border:1px solid var(--line);
    border-radius:6px;
    font-size:12.5px;
    background:var(--white);
    font-family:inherit;
  }

  .bb-table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:8px;background:var(--white);}
  table.bb-table{width:100%;border-collapse:collapse;font-size:13px;}
  table.bb-table th{
    text-align:left;
    padding:9px 10px;
    background:var(--paper-2);
    color:var(--green-deep);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.04em;
    border-bottom:1px solid var(--line);
    white-space:nowrap;
  }
  table.bb-table td{
    padding:9px 10px;
    border-bottom:1px solid var(--line);
    white-space:nowrap;
  }
  table.bb-table tr:last-child td{border-bottom:none;}
  .bb-tag{
    display:inline-block;
    padding:3px 9px;
    border-radius:10px;
    font-size:12px;
    font-weight:600;
  }
  .bb-tag.pos{background:var(--green-pale);color:var(--green-deep);}
  .bb-tag.neg{background:var(--rust-pale);color:var(--rust);}
  .bb-del{
    border:none;background:none;color:#8a8a7d;cursor:pointer;font-size:16px;
    width:40px;height:40px;min-width:40px;
    display:inline-flex;align-items:center;justify-content:center;
    border-radius:6px;
    touch-action:manipulation;user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  .bb-del:active{background:var(--rust-pale);color:var(--rust);}
  .bb-del:hover{color:var(--rust);}
  .bb-list-item{padding-right:6px;}

  /* Karten-Ansicht für Bewegungen - auf dem Handy leichter mit dem Daumen
     zu bedienen als eine breite Tabelle zum Hin- und Herscrollen. */
  .bb-move-cards{display:flex;flex-direction:column;gap:12px;}
  .bb-move-card{
    background:var(--white);
    border:1px solid var(--line);
    border-radius:11px;
    padding:17px 17px;
  }
  .bb-move-card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    margin-bottom:10px;
  }
  .bb-move-card-title{font-family:'Roboto Slab',serif;font-weight:700;font-size:24px;color:var(--ink);}
  .bb-move-card-sub{font-size:17px;color:#7a7a6d;margin-top:3px;}
  .bb-move-card-qty{font-family:'Roboto Slab',serif;font-weight:700;font-size:36px;white-space:nowrap;}
  .bb-move-card-qty.pos{color:var(--green-deep);}
  .bb-move-card-qty.neg{color:var(--rust);}
  .bb-move-card-meta{font-size:19px;color:#4a4a40;margin:8px 0;}
  .bb-move-card-meta b{color:var(--ink);}
  .bb-move-card-note{font-size:17px;color:#7a7a6d;font-style:italic;margin-bottom:12px;}
  .bb-move-card-actions{display:flex;gap:8px;}
  .bb-move-card-actions button{
    flex:1;
    min-height:58px;
    border-radius:8px;
    font-weight:700;
    font-size:18px;
    cursor:pointer;
    touch-action:manipulation;
    border:1px solid var(--line);
    background:var(--paper);
    color:var(--ink);
  }
  .bb-move-card-actions button.edit{border-color:var(--green-deep);color:var(--green-deep);}
  .bb-move-card-actions button.del{border-color:var(--rust);color:var(--rust);}
  .bb-move-card-actions button:active{opacity:.7;}

  @media (min-width:701px){
    .bb-move-cards{display:none;}
  }
  @media (max-width:700px){
    .bb-table-wrap{display:none;}
  }

  .bb-list{border:1px solid var(--line);border-radius:8px;background:var(--white);overflow:hidden;margin-bottom:10px;}
  .bb-list-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 8px 16px 18px;
    border-bottom:1px solid var(--line);
    font-size:18px;
  }
  .bb-list-item:last-child{border-bottom:none;}
  .bb-add-row{display:flex;gap:8px;margin-bottom:20px;}
  .bb-add-row input{flex:1;padding:12px 13px;border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:16px;min-height:46px;}

  .bb-subhead{font-size:14px;font-weight:700;color:var(--green-deep);margin:26px 0 10px;text-transform:uppercase;letter-spacing:.04em;}
  .bb-subhead:first-child{margin-top:0;}

  .bb-anfang-grid{border:1px solid var(--line);border-radius:8px;background:var(--white);overflow:hidden;}
  .bb-anfang-row{display:grid;grid-template-columns:1fr 90px 140px;gap:8px;align-items:center;padding:14px 12px;border-bottom:1px solid var(--line);font-size:17px;}
  @media (max-width:600px){
    .bb-anfang-row{
      grid-template-columns:1fr 1fr;
      grid-template-areas:"label label" "anzahl datum";
      row-gap:8px;
    }
    .bb-anfang-row > span:first-child{grid-area:label;font-weight:600;}
    .bb-anfang-row > .anfang-input{grid-area:anzahl;}
    .bb-anfang-row > .anfang-datum-input{grid-area:datum;}
  }
  .bb-anfang-row:last-child{border-bottom:none;}
  .bb-anfang-row input{padding:10px 8px;border:1px solid var(--line);border-radius:5px;font-size:16px;font-family:inherit;width:100%;min-height:42px;}
  .bb-anfang-farm{font-weight:700;font-size:13.5px;color:var(--green-deep);grid-column:1/-1;background:var(--paper-2);margin:0 -12px;padding:9px 12px;}

  .bb-import-row{display:flex;gap:8px;align-items:center;}

  .bb-kat-checks{display:flex;flex-direction:column;gap:2px;}
  .bb-kat-check{
    display:flex;align-items:center;gap:12px;
    padding:12px 10px;
    border:1px solid var(--line);
    border-radius:7px;
    margin-bottom:6px;
    font-size:16px;
    cursor:pointer;
    background:var(--paper);
  }
  .bb-kat-check input{width:22px;height:22px;flex-shrink:0;accent-color:var(--green-deep);}
  .bb-betrieb-edit-panel{
    background:var(--paper-2);
    padding:14px 16px;
    margin:-4px 0 8px;
    border-bottom:1px solid var(--line);
  }


  @media (max-width:480px){
    .bb-row2{grid-template-columns:1fr;}
    .bb-title{font-size:22px;}
    .bb-stamp{display:none;}
    .bb-backup-btns{margin-left:0;width:100%;}
    .bb-backup-btns button{flex:1;}
  }
</style>

<script>
(function(){
  const KATEGORIEN = ['Sauen','Saugferkel','Eber','Ferkel Flatdeck','Mastschweine'];
  const ARTEN = [
    {id:'geburt',  label:'Geburt',  sign:1,  partnerLabel:null},
    {id:'zukauf',  label:'Zukauf',  sign:1,  partnerLabel:'Herkunft'},
    {id:'zugang',  label:'Zugang',  sign:1,  partnerLabel:'Herkunft'},
    {id:'abgang',  label:'Abgang',  sign:-1, partnerLabel:'Abnehmer'},
    {id:'verlust', label:'Verlust', sign:-1, partnerLabel:'Abnehmer'},
  ];
  const artById = id => ARTEN.find(a=>a.id===id);

  // ============================================================
  // KONFIGURATION - hier deine Google Apps Script Web-App-URL eintragen
  // (Anleitung: siehe separate Datei "google-apps-script-anleitung.txt")
  // Beispiel: 'https://script.google.com/macros/s/AKfycb.../exec'
  const SHEET_API_URL = 'https://script.google.com/macros/s/AKfycbyrKbtQ7W0dMgs-O07Umpf1ibH2FYT3-sYElklgP1krB5mAs_rNFhquqhY8mug7cIsPJw/exec';
  // ============================================================

  // Daten werden über ein Google Sheet (per Apps Script Web-App) gespeichert.
  // Dadurch funktioniert die App komplett unabhängig von Claude - jeder mit
  // dem Link kann mitschreiben, ganz ohne eigenes Konto irgendwo.
  let state = { betriebe: [], kunden: [], bewegungen: [], anfangsbestand: {} };
  let activeTab = 'bestand';
  let formArt = 'geburt';
  let editingId = null;
  let loaded = false;

  const contentEl = document.getElementById('content');
  const stampDate = document.getElementById('stampDate');
  const syncText = document.getElementById('syncText');
  const syncDot = document.getElementById('syncDot');

  function uid(){ return (crypto.randomUUID ? crypto.randomUUID() : 'id-'+Date.now()+'-'+Math.random().toString(16).slice(2)); }
  function todayISO(){ return new Date().toISOString().slice(0,10); }
  function fmtDate(iso){ const [y,m,d]=iso.split('-'); return d+'.'+m+'.'+y; }
  function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  stampDate.textContent = fmtDate(todayISO());

  function wait(ms){ return new Promise(r=>setTimeout(r, ms)); }

  // Robuster Abruf/Speicher über das Google-Sheet-Backend: mehrere Versuche,
  // bevor aufgegeben wird. Gleiche Signatur wie zuvor, damit der Rest der
  // App unverändert bleiben kann.
  async function storageGetSafe(key, retries=2){
    for(let attempt=0; attempt<=retries; attempt++){
      try{
        const res = await fetch(SHEET_API_URL + '?action=get&key=' + encodeURIComponent(key) + '&_=' + Date.now());
        if(!res.ok) throw new Error('HTTP ' + res.status);
        const json = await res.json();
        if(!json.ok) throw new Error('API-Fehler');
        return { ok:true, value: json.value };
      }catch(e){
        if(attempt<retries) await wait(400*(attempt+1));
        else { console.error('Laden fehlgeschlagen für', key, e); return { ok:false, value:null }; }
      }
    }
  }
  async function storageSetSafe(key, value, retries=2){
    for(let attempt=0; attempt<=retries; attempt++){
      try{
        // Content-Type text/plain vermeidet einen CORS-Preflight, den Apps Script nicht beantwortet.
        const res = await fetch(SHEET_API_URL, {
          method:'POST',
          headers:{'Content-Type':'text/plain;charset=utf-8'},
          body: JSON.stringify({ key, value }),
        });
        if(!res.ok) throw new Error('HTTP ' + res.status);
        const json = await res.json();
        if(!json.ok) throw new Error('API-Fehler');
        return { ok:true };
      }catch(e){
        if(attempt<retries) await wait(400*(attempt+1));
        else { console.error('Speichern fehlgeschlagen für', key, e); return { ok:false }; }
      }
    }
  }

  let isEditingField = false;
  contentEl.addEventListener('focusin', (e)=>{
    if(e.target.matches('input, textarea, select')) isEditingField = true;
  });
  contentEl.addEventListener('focusout', (e)=>{
    if(e.target.matches('input, textarea, select')){
      setTimeout(()=>{
        isEditingField = contentEl.contains(document.activeElement) &&
          document.activeElement.matches('input, textarea, select');
      }, 50);
    }
  });

  const DEFAULTS = { betriebe: [], kunden: [], bewegungen: [], anfangsbestand: {} };

  async function loadAll(opts){
    if(!SHEET_API_URL){
      contentEl.innerHTML = `<div class="bb-empty">
        <b>Noch nicht eingerichtet.</b><br><br>
        Trage in der Datei die Zeile <code>const SHEET_API_URL = '...'</code>
        mit der Web-App-URL deines Google Apps Script ein (siehe beiliegende Anleitung).<br>
        Danach die Datei einmal neu öffnen.
      </div>`;
      syncText.textContent = 'nicht eingerichtet';
      syncDot.classList.add('err');
      return;
    }
    const forceRender = opts && opts.forceRender;
    const isFirstLoad = !loaded;
    syncText.textContent = 'wird geladen …';
    const [betriebeR, kundenR, bewegungenR, anfangR] = await Promise.all([
      storageGetSafe('betriebe'),
      storageGetSafe('kunden'),
      storageGetSafe('bewegungen'),
      storageGetSafe('anfangsbestand'),
    ]);
    const results = { betriebe: betriebeR, kunden: kundenR, bewegungen: bewegungenR, anfangsbestand: anfangR };
    let anyRealFail = false;

    for(const key of Object.keys(results)){
      const r = results[key];
      if(r.ok){
        state[key] = r.value ?? DEFAULTS[key];
      } else if(isFirstLoad){
        // Bei der allerersten Ladung meldet die Plattform einen fehlenden Schlüssel
        // (noch nie gespeichert) ebenfalls als Fehler. Das ist normal, kein Ausfall:
        // mit leerem Standardwert starten und den Schlüssel gleich anlegen.
        state[key] = DEFAULTS[key];
        storageSetSafe(key, DEFAULTS[key]);
      } else {
        anyRealFail = true;
      }
    }

    loaded = true;
    syncDot.classList.toggle('err', anyRealFail);
    syncText.textContent = anyRealFail ? 'Synchronisierung gestört' : 'synchronisiert';
    if(forceRender || !isEditingField){
      render();
    }
  }

  document.getElementById('refreshBtn').addEventListener('click', ()=>loadAll({forceRender:true}));
  setInterval(loadAll, 25000);

  // ---------- Sichern / Laden als Datei (zusätzliches manuelles Backup) ----------
  function buildBackupPayload(){
    return {
      typ: 'bestandsbuch-sicherung',
      version: 1,
      exportiertAm: new Date().toISOString(),
      betriebe: state.betriebe,
      kunden: state.kunden,
      bewegungen: state.bewegungen,
      anfangsbestand: state.anfangsbestand,
    };
  }

  async function exportAllData(){
    const json = JSON.stringify(buildBackupPayload(), null, 2);
    const filename = 'bestandsbuch_sicherung_' + todayISO() + '.json';

    // Direkter Versuch: natives Teilen (AirDrop, Mail, Dateien-App usw.) - auf iPhone am zuverlässigsten
    try{
      if(navigator.canShare && navigator.share){
        const file = new File([json], filename, {type:'application/json'});
        if(navigator.canShare({files:[file]})){
          await navigator.share({files:[file], title:'Bestandsbuch Sicherung'});
          return;
        }
      }
    }catch(e){
      // Nutzer hat abgebrochen oder Teilen schlug fehl - Dialog als Rückfallebene zeigen
    }

    showBackupDialog(json, filename);
  }

  function showBackupDialog(json, filename){
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(30,32,26,.55);z-index:100;display:flex;align-items:flex-end;justify-content:center;';
    overlay.innerHTML = `
      <div style="background:var(--white);width:100%;max-width:900px;border-radius:14px 14px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom));max-height:80vh;display:flex;flex-direction:column;gap:12px;">
        <div style="font-family:'Roboto Slab',serif;font-weight:700;color:var(--green-deep);font-size:16px;">Sicherung herunterladen</div>
        <div style="font-size:13px;color:#5b5b50;">Der automatische Download hat nicht geklappt (typisch für iPhone-Safari in dieser Ansicht). Nutze stattdessen einen dieser Wege:</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <button class="bb-btn" id="bkDownloadBtn">Datei herunterladen (neuer Tab)</button>
          <button class="bb-btn secondary" id="bkCopyBtn">Text in Zwischenablage kopieren</button>
        </div>
        <textarea readonly style="width:100%;height:110px;font-family:monospace;font-size:11px;padding:8px;border:1px solid var(--line);border-radius:6px;background:var(--paper);">${escapeHtml(json)}</textarea>
        <button class="bb-btn secondary" id="bkCloseBtn">Schließen</button>
      </div>
    `;
    document.body.appendChild(overlay);

    overlay.querySelector('#bkDownloadBtn').addEventListener('click', ()=>{
      const blob = new Blob([json], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const win = window.open(url, '_blank');
      if(!win){
        const a = document.createElement('a');
        a.href = url; a.download = filename; a.target = '_blank';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
      }
      setTimeout(()=>URL.revokeObjectURL(url), 30000);
    });

    overlay.querySelector('#bkCopyBtn').addEventListener('click', async ()=>{
      const btn = overlay.querySelector('#bkCopyBtn');
      try{
        await navigator.clipboard.writeText(json);
        btn.textContent = 'Kopiert ✓';
      }catch(e){
        overlay.querySelector('textarea').select();
        document.execCommand('copy');
        btn.textContent = 'Kopiert ✓';
      }
      setTimeout(()=>{ btn.textContent = 'Text in Zwischenablage kopieren'; }, 2000);
    });

    overlay.querySelector('#bkCloseBtn').addEventListener('click', ()=> overlay.remove());
  }

  function importAllDataFromFile(file){
    const reader = new FileReader();
    reader.onload = async () => {
      try{
        const data = JSON.parse(reader.result);
        if(!data || typeof data !== 'object') throw new Error('Ungültiges Format');
        const hasAny = (state.betriebe.length || state.kunden.length || state.bewegungen.length);
        if(hasAny && !confirm('Aktuell angezeigte Daten werden durch die Sicherungsdatei ersetzt (auch in der Cloud). Fortfahren?')) return;
        const next = {
          betriebe: Array.isArray(data.betriebe) ? data.betriebe : [],
          kunden: Array.isArray(data.kunden) ? data.kunden : [],
          bewegungen: Array.isArray(data.bewegungen) ? data.bewegungen : [],
          anfangsbestand: (data.anfangsbestand && typeof data.anfangsbestand==='object') ? data.anfangsbestand : {},
        };
        const results = await Promise.all([
          storageSetSafe('betriebe', next.betriebe),
          storageSetSafe('kunden', next.kunden),
          storageSetSafe('bewegungen', next.bewegungen),
          storageSetSafe('anfangsbestand', next.anfangsbestand),
        ]);
        if(results.every(r=>r.ok)){
          state = next;
          render();
          alert('Sicherung erfolgreich geladen und synchronisiert.');
        } else {
          alert('Import teilweise fehlgeschlagen – bitte erneut versuchen.');
        }
      }catch(e){
        alert('Diese Datei konnte nicht gelesen werden. Bitte eine gültige Bestandsbuch-Sicherung (.json) auswählen.');
      }
    };
    reader.readAsText(file);
  }

  const importFileInput = document.getElementById('importFileInput');
  importFileInput.addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(file) importAllDataFromFile(file);
    importFileInput.value = '';
  });

  document.getElementById('headerExportBtn').addEventListener('click', exportAllData);

  // ---------- Berechnungen ----------
  function betriebKategorien(betrieb){
    // Rückwärtskompatibel: alte Betriebe ohne "kategorien"-Feld dürfen alle Kategorien buchen.
    if(!betrieb || !Array.isArray(betrieb.kategorien) || betrieb.kategorien.length===0) return KATEGORIEN;
    return KATEGORIEN.filter(k => betrieb.kategorien.includes(k));
  }

  // Anfangsbestand wird als {anzahl, datum} gespeichert. Ältere Daten hatten
  // hier nur eine reine Zahl - die werden rückwärtskompatibel gelesen.
  function getAnfangsbestand(betriebId, kategorie){
    const raw = state.anfangsbestand[betriebId] && state.anfangsbestand[betriebId][kategorie];
    if(raw && typeof raw === 'object'){
      return { anzahl: raw.anzahl || 0, datum: raw.datum || '' };
    }
    return { anzahl: raw || 0, datum: '' };
  }

  function currentStock(betriebId, kategorie){
    const start = getAnfangsbestand(betriebId, kategorie).anzahl;
    let sum = start;
    for(const b of state.bewegungen){
      if(b.betriebId===betriebId && b.kategorie===kategorie){
        const art = artById(b.art);
        sum += (art ? art.sign : 0) * b.anzahl;
      }
    }
    return sum;
  }

  // ---------- Rendering ----------
  function render(){
    document.querySelectorAll('.bb-tab').forEach(t => t.classList.toggle('active', t.dataset.tab===activeTab));
    if(activeTab==='bestand') renderBestand();
    else if(activeTab==='erfassen') renderErfassen();
    else if(activeTab==='historie') renderHistorie();
    else if(activeTab==='stamm') renderStamm();
  }

  function renderBestand(){
    if(state.betriebe.length===0){
      contentEl.innerHTML = `<div class="bb-empty">Noch kein Betrieb angelegt.<br>Lege unter <b>Stammdaten</b> deinen ersten Betrieb an – oder lade oben rechts eine vorhandene <b>Sicherung</b>.</div>`;
      return;
    }
    let html = '<div class="bb-section-title">Aktueller Bestand</div>';
    for(const betrieb of state.betriebe){
      let total = 0;
      let cells = '';
      for(const kat of betriebKategorien(betrieb)){
        const val = currentStock(betrieb.id, kat);
        total += val;
        cells += `<div class="bb-cat-cell"><div class="bb-cat-label">${escapeHtml(kat)}</div><div class="bb-cat-value">${val}</div></div>`;
      }
      html += `
        <div class="bb-farm-card">
          <div class="bb-farm-card-head"><span>${escapeHtml(betrieb.name)}</span><span class="bb-farm-total">${total} Tiere gesamt</span></div>
          <div class="bb-cat-grid">${cells}</div>
        </div>`;
    }
    contentEl.innerHTML = html;
  }

  function renderErfassen(){
    if(state.betriebe.length===0){
      contentEl.innerHTML = '<div class="bb-empty">Lege zuerst unter <b>Stammdaten</b> einen Betrieb an.</div>';
      return;
    }
    const editing = editingId ? state.bewegungen.find(b=>b.id===editingId) : null;
    if(editingId && !editing){ editingId = null; } // Eintrag existiert nicht mehr (z.B. gelöscht)

    const art = artById(formArt);
    const needsPartner = !!art.partnerLabel;

    let typeButtons = ARTEN.map(a => `
      <button type="button" class="bb-type-btn ${a.sign>0?'pos':'neg'} ${a.id===formArt?'active':''}" data-art="${a.id}">${a.label}</button>
    `).join('');

    let betriebOptions = state.betriebe.map(b=>`<option value="${b.id}" ${editing && editing.betriebId===b.id ? 'selected':''}>${escapeHtml(b.name)}</option>`).join('');
    const selectedBetriebId = editing ? editing.betriebId : state.betriebe[0].id;
    function katOptionsFor(betriebId, selectedKat){
      const betrieb = state.betriebe.find(b=>b.id===betriebId);
      return betriebKategorien(betrieb).map(k=>`<option value="${k}" ${selectedKat===k ? 'selected':''}>${escapeHtml(k)}</option>`).join('');
    }
    let katOptions = katOptionsFor(selectedBetriebId, editing ? editing.kategorie : null);
    let kundenOptions = '<option value="">– bitte wählen –</option>' + state.kunden.map(k=>`<option value="${k.id}" ${editing && editing.partnerId===k.id ? 'selected':''}>${escapeHtml(k.name)}</option>`).join('');

    const startAnzahl = editing ? editing.anzahl : 1;
    const startDatum = editing ? editing.datum : todayISO();
    const startNotiz = editing ? (editing.notiz||'') : '';

    contentEl.innerHTML = `
      <div class="bb-section-title">${editing ? 'Bewegung bearbeiten' : 'Neue Bewegung erfassen'}</div>
      ${editing ? `<div class="bb-msg" style="background:var(--gold);color:#fff;">Du bearbeitest einen bestehenden Eintrag vom ${fmtDate(editing.datum)}.</div>` : ''}
      <div id="formMsg"></div>
      <form class="bb-form" id="bewegungForm">
        <div class="bb-field"><label>Bewegungsart</label><div class="bb-type-grid">${typeButtons}</div></div>
        <div class="bb-row2">
          <div class="bb-field"><label>Datum</label><input type="date" name="datum" value="${startDatum}" required></div>
          <div class="bb-field"><label>Betrieb</label><select name="betriebId" required>${betriebOptions}</select></div>
        </div>
        <div class="bb-row2">
          <div class="bb-field"><label>Kategorie</label><select name="kategorie" required>${katOptions}</select></div>
          <div class="bb-field">
            <label>Anzahl</label>
            <div class="bb-stepper">
              <button type="button" class="bb-stepper-btn" id="anzahlMinus">−</button>
              <input type="number" name="anzahl" id="anzahlInput" class="bb-stepper-value" min="1" step="1" value="${startAnzahl}" inputmode="numeric" required>
              <button type="button" class="bb-stepper-btn" id="anzahlPlus">+</button>
            </div>
            <div class="bb-chip-row">
              ${[1,2,3,5,10,12].map(n=>`<button type="button" class="bb-chip" data-n="${n}">${n}</button>`).join('')}
            </div>
          </div>
        </div>
        ${needsPartner ? `
        <div class="bb-field"><label>${art.partnerLabel}</label>
          <select name="partnerId" ${state.kunden.length? '':'disabled'}>${kundenOptions}</select>
          ${state.kunden.length? '' : '<div style="font-size:12px;color:#8a8a7d;margin-top:4px;">Noch keine Kunden angelegt – unter Stammdaten hinzufügen.</div>'}
        </div>` : ''}
        <div class="bb-field"><label>Notiz (optional)</label><textarea name="notiz" rows="2">${escapeHtml(startNotiz)}</textarea></div>
        <div style="display:flex;gap:8px;">
          <button type="submit" class="bb-btn" style="flex:1;">${editing ? 'Änderungen speichern' : 'Bewegung speichern'}</button>
          ${editing ? '<button type="button" class="bb-btn secondary" id="cancelEditBtn">Abbrechen</button>' : ''}
        </div>
      </form>
    `;

    contentEl.querySelectorAll('.bb-type-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{ formArt = btn.dataset.art; renderErfassen(); });
    });

    contentEl.querySelector('select[name=betriebId]').addEventListener('change', (e)=>{
      const katSelect = contentEl.querySelector('select[name=kategorie]');
      katSelect.innerHTML = katOptionsFor(e.target.value, null);
    });

    const cancelBtn = contentEl.querySelector('#cancelEditBtn');
    if(cancelBtn){
      cancelBtn.addEventListener('click', ()=>{ editingId = null; formArt = 'geburt'; renderErfassen(); });
    }

    const anzahlInput = contentEl.querySelector('#anzahlInput');
    contentEl.querySelector('#anzahlMinus').addEventListener('click', ()=>{
      const v = Math.max(1, (parseInt(anzahlInput.value,10)||1) - 1);
      anzahlInput.value = v;
    });
    contentEl.querySelector('#anzahlPlus').addEventListener('click', ()=>{
      const v = (parseInt(anzahlInput.value,10)||0) + 1;
      anzahlInput.value = v;
    });
    contentEl.querySelectorAll('.bb-chip').forEach(chip=>{
      chip.addEventListener('click', ()=>{ anzahlInput.value = chip.dataset.n; });
    });

    contentEl.querySelector('#bewegungForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const fd = new FormData(e.target);
      const betriebId = fd.get('betriebId');
      const kategorie = fd.get('kategorie');
      const anzahl = parseInt(fd.get('anzahl'),10);
      const datum = fd.get('datum');
      const partnerId = fd.get('partnerId') || null;
      const notiz = (fd.get('notiz')||'').trim();
      const msgEl = document.getElementById('formMsg');

      if(!anzahl || anzahl<1){ msgEl.innerHTML = '<div class="bb-msg err">Bitte eine Anzahl größer 0 angeben.</div>'; return; }
      if(needsPartner && !partnerId){ msgEl.innerHTML = `<div class="bb-msg err">Bitte ${art.partnerLabel} auswählen.</div>`; return; }

      const submitBtn = e.target.querySelector('button[type=submit]');
      submitBtn.disabled = true; submitBtn.textContent = 'Speichere …';

      let next;
      if(editing){
        next = state.bewegungen.map(b => b.id===editing.id
          ? { ...b, datum, betriebId, kategorie, art: formArt, anzahl, partnerId, notiz }
          : b
        );
      } else {
        next = [...state.bewegungen, { id: uid(), datum, betriebId, kategorie, art: formArt, anzahl, partnerId, notiz }];
      }

      const result = await storageSetSafe('bewegungen', next);

      if(result.ok){
        state.bewegungen = next;
        if(editing){
          editingId = null;
          formArt = 'geburt';
          activeTab = 'historie';
          render();
        } else {
          msgEl.innerHTML = '<div class="bb-msg ok">Bewegung gespeichert und synchronisiert.</div>';
          e.target.reset();
          e.target.querySelector('[name=datum]').value = todayISO();
        }
      } else {
        msgEl.innerHTML = '<div class="bb-msg err">Speichern fehlgeschlagen – deine Eingabe ist noch im Formular, bitte erneut auf „' + (editing?'Änderungen speichern':'Bewegung speichern') + '" tippen.</div>';
        submitBtn.disabled = false; submitBtn.textContent = editing ? 'Änderungen speichern' : 'Bewegung speichern';
      }
    });
  }

  let filters = { betriebId:'', kategorie:'', art:'', von:'', bis:'' };

  function filteredBewegungen(){
    return state.bewegungen.filter(b=>{
      if(filters.betriebId && b.betriebId!==filters.betriebId) return false;
      if(filters.kategorie && b.kategorie!==filters.kategorie) return false;
      if(filters.art && b.art!==filters.art) return false;
      if(filters.von && b.datum < filters.von) return false;
      if(filters.bis && b.datum > filters.bis) return false;
      return true;
    }).sort((a,b)=> b.datum.localeCompare(a.datum));
  }

  function betriebName(id){ const b = state.betriebe.find(x=>x.id===id); return b? b.name : '–'; }
  function kundeName(id){ if(!id) return '–'; const k = state.kunden.find(x=>x.id===id); return k? k.name : '–'; }

    contentEl.innerHTML = `

          <thead><tr><th>Datum</th><th>Betrieb</th><th>Kategorie</th><th>Bewegung</th><th>Anzahl</th><th>Herkunft/Abnehmer</th><th>Notiz</th><th></th></tr></thead>
          <tbody>${tableRows || '<tr><td colspan="8" style="text-align:center;color:#8a8a7d;padding:20px;">Keine Bewegungen gefunden.</td></tr>'}</tbody>
        </table>
      </div>
    `;

    contentEl.querySelector('#fBetrieb').value = filters.betriebId;
    contentEl.querySelector('#fKategorie').value = filters.kategorie;
    contentEl.querySelector('#fArt').value = filters.art;
    contentEl.querySelector('#fVon').value = filters.von;
    contentEl.querySelector('#fBis').value = filters.bis;

    contentEl.querySelector('#fBetrieb').addEventListener('change', e=>{ filters.betriebId = e.target.value; renderHistorie(); });
    contentEl.querySelector('#fKategorie').addEventListener('change', e=>{ filters.kategorie = e.target.value; renderHistorie(); });
    contentEl.querySelector('#fArt').addEventListener('change', e=>{ filters.art = e.target.value; renderHistorie(); });
    contentEl.querySelector('#fVon').addEventListener('change', e=>{ filters.von = e.target.value; renderHistorie(); });
    contentEl.querySelector('#fBis').addEventListener('change', e=>{ filters.bis = e.target.value; renderHistorie(); });

    contentEl.querySelectorAll('[data-edit-id]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const entry = state.bewegungen.find(x=>x.id===btn.dataset.editId);
        if(!entry) return;
        editingId = entry.id;
        formArt = entry.art;
        activeTab = 'erfassen';
        render();
      });
    });

    contentEl.querySelectorAll('[data-id]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        if(!confirm('Diese Bewegung wirklich löschen?')) return;
        btn.disabled = true;
        const next = state.bewegungen.filter(x=>x.id!==btn.dataset.id);
        const result = await storageSetSafe('bewegungen', next);
        if(result.ok){
          state.bewegungen = next;
          renderHistorie();
        } else {
          btn.disabled = false;
          alert('Löschen fehlgeschlagen. Bitte erneut versuchen.');
        }
      });
    });

    contentEl.querySelector('#exportCsvBtn').addEventListener('click', ()=>{
      const data = filteredBewegungen();
      const header = ['Datum','Betrieb','Kategorie','Bewegungsart','Anzahl','Herkunft/Abnehmer','Notiz'];
      const csvRows = [header.join(';')];
      for(const b of data){
        const art = artById(b.art);
        csvRows.push([
          fmtDate(b.datum),
          betriebName(b.betriebId),
          b.kategorie,
          art.label,
          (art.sign>0?'+':'-')+b.anzahl,
          kundeName(b.partnerId),
          (b.notiz||'').replace(/;/g,',').replace(/\n/g,' ')
        ].join(';'));
      }
      const csv = '\uFEFF' + csvRows.join('\n');
      const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'bewegungen_' + todayISO() + '.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });
  }

  function renderStamm(){
    let betriebeList = state.betriebe.map(b=>{
      const kats = betriebKategorien(b);
      const katSummary = kats.length===KATEGORIEN.length ? 'alle Kategorien' : kats.join(', ');
      return `
      <div class="bb-list-item" style="align-items:flex-start;">
        <span>
          <div>${escapeHtml(b.name)}</div>
          <div style="font-size:13px;color:#8a8a7d;font-weight:400;margin-top:2px;">${escapeHtml(katSummary)}</div>
        </span>
        <span style="display:flex;">
          <button class="bb-del" data-edit-betrieb-id="${b.id}" title="Kategorien bearbeiten">✎</button>
          <button class="bb-del" data-type="betrieb" data-id="${b.id}">✕</button>
        </span>
      </div>
      <div class="bb-betrieb-edit-panel" data-panel-for="${b.id}" style="display:none;"></div>
    `;
    }).join('') || '<div class="bb-list-item" style="color:#8a8a7d;">Noch keine Betriebe angelegt.</div>';

    let kundenList = state.kunden.map(k=>`
      <div class="bb-list-item"><span>${escapeHtml(k.name)}</span><button class="bb-del" data-type="kunde" data-id="${k.id}">✕</button></div>
    `).join('') || '<div class="bb-list-item" style="color:#8a8a7d;">Noch keine Kunden angelegt.</div>';

    let anfangHtml = '';
    if(state.betriebe.length===0){
      anfangHtml = '<div class="bb-empty" style="padding:16px 0;">Lege zuerst einen Betrieb an.</div>';
    } else {
      let rows = '';
      for(const betrieb of state.betriebe){
        rows += `<div class="bb-anfang-farm">${escapeHtml(betrieb.name)}</div>`;
        rows += `<div style="display:flex;justify-content:flex-end;gap:8px;padding:8px 12px 0;font-size:11px;color:#8a8a7d;text-transform:uppercase;">
          <span style="width:90px;text-align:center;">Anzahl</span>
          <span style="width:140px;text-align:center;">Stichtag</span>
        </div>`;
        for(const kat of betriebKategorien(betrieb)){
          const cur = getAnfangsbestand(betrieb.id, kat);
          rows += `<div class="bb-anfang-row">
            <span>${escapeHtml(kat)}</span>
            <input type="number" min="0" step="1" value="${cur.anzahl}" data-betrieb="${betrieb.id}" data-kat="${kat}" class="anfang-input" placeholder="Anzahl">
            <input type="date" value="${cur.datum}" data-betrieb="${betrieb.id}" data-kat="${kat}" class="anfang-datum-input">
          </div>`;
        }
      }
      anfangHtml = `<div class="bb-anfang-grid">${rows}</div>
        <div style="margin-top:10px;"><button class="bb-btn small" id="saveAnfangBtn">Anfangsbestand übernehmen</button> <span id="anfangMsg" style="font-size:12px;color:var(--green-mid);"></span></div>`;
    }

    contentEl.innerHTML = `
      <div class="bb-subhead">Betriebe</div>
      <div class="bb-list">${betriebeList}</div>
      <div class="bb-form" style="padding:14px;margin-bottom:8px;">
        <div class="bb-field" style="margin-bottom:12px;">
          <label>Neuer Betrieb – Name</label>
          <input type="text" id="newBetrieb" placeholder="z. B. Betrieb Nord">
        </div>
        <div class="bb-field" style="margin-bottom:14px;">
          <label>Buchbare Kategorien</label>
          <div class="bb-kat-checks" id="newBetriebKats">
            ${KATEGORIEN.map(k=>`
              <label class="bb-kat-check"><input type="checkbox" value="${k}" checked> ${escapeHtml(k)}</label>
            `).join('')}
          </div>
        </div>
        <button class="bb-btn" id="addBetriebBtn">Betrieb hinzufügen</button>
      </div>
      <div id="betriebMsg"></div>

      <div class="bb-subhead">Kunden (Herkunft / Abnehmer)</div>
      <div class="bb-list">${kundenList}</div>
      <div class="bb-add-row"><input type="text" id="newKunde" placeholder="Name des Kunden bzw. Lieferanten"><button class="bb-btn small" id="addKundeBtn">Hinzufügen</button></div>
      <div id="kundeMsg"></div>

      <div class="bb-subhead">Anfangsbestand je Betrieb</div>
      ${anfangHtml}

      <div class="bb-subhead">Sicherung</div>
      <div class="bb-form" style="padding:14px;">
        <p style="margin:0 0 12px;font-size:13px;color:#5b5b50;">Deine Daten werden automatisch in der Cloud gespeichert und zwischen deinen Geräten abgeglichen. Zusätzlich kannst du jederzeit eine Sicherungsdatei herunterladen oder einspielen.</p>
        <div class="bb-import-row">
          <button class="bb-btn" id="stammExportBtn">Sicherung herunterladen</button>
          <button class="bb-btn secondary" id="stammImportBtn">Sicherung laden</button>
        </div>
      </div>
    `;

    contentEl.querySelector('#addBetriebBtn').addEventListener('click', async ()=>{
      const input = contentEl.querySelector('#newBetrieb');
      const btn = contentEl.querySelector('#addBetriebBtn');
      const msgEl = contentEl.querySelector('#betriebMsg');
      const name = input.value.trim();
      if(!name) return;
      const checked = Array.from(contentEl.querySelectorAll('#newBetriebKats input:checked')).map(cb=>cb.value);
      if(checked.length===0){
        if(msgEl) msgEl.innerHTML = '<div class="bb-msg err">Bitte mindestens eine Kategorie auswählen.</div>';
        return;
      }
      btn.disabled = true; btn.textContent = 'Speichere …';
      if(msgEl) msgEl.innerHTML = '';
      const next = [...state.betriebe, {id: uid(), name, kategorien: checked}];
      const result = await storageSetSafe('betriebe', next);
      if(result.ok){
        state.betriebe = next;
        renderStamm();
      } else {
        btn.disabled = false; btn.textContent = 'Betrieb hinzufügen';
        if(msgEl) msgEl.innerHTML = '<div class="bb-msg err">Speichern fehlgeschlagen. Deine Eingabe ist noch da – bitte erneut auf „Betrieb hinzufügen" tippen.</div>';
      }
    });

    contentEl.querySelector('#addKundeBtn').addEventListener('click', async ()=>{
      const input = contentEl.querySelector('#newKunde');
      const btn = contentEl.querySelector('#addKundeBtn');
      const msgEl = contentEl.querySelector('#kundeMsg');
      const name = input.value.trim();
      if(!name) return;
      btn.disabled = true; btn.textContent = 'Speichere …';
      if(msgEl) msgEl.innerHTML = '';
      const next = [...state.kunden, {id: uid(), name}];
      const result = await storageSetSafe('kunden', next);
      if(result.ok){
        state.kunden = next;
        renderStamm();
      } else {
        btn.disabled = false; btn.textContent = 'Hinzufügen';
        if(msgEl) msgEl.innerHTML = '<div class="bb-msg err">Speichern fehlgeschlagen. Deine Eingabe ist noch da – bitte erneut auf „Hinzufügen" tippen.</div>';
      }
    });

    contentEl.querySelectorAll('[data-edit-betrieb-id]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const betrieb = state.betriebe.find(x=>x.id===btn.dataset.editBetriebId);
        if(!betrieb) return;
        const panel = contentEl.querySelector(`.bb-betrieb-edit-panel[data-panel-for="${betrieb.id}"]`);
        const isOpen = panel.style.display !== 'none';
        // alle Panels schließen, dann ggf. dieses öffnen
        contentEl.querySelectorAll('.bb-betrieb-edit-panel').forEach(p=>p.style.display='none');
        if(isOpen) return;

        const current = betriebKategorien(betrieb);
        panel.innerHTML = `
          <div class="bb-kat-checks">
            ${KATEGORIEN.map(k=>`
              <label class="bb-kat-check"><input type="checkbox" value="${k}" ${current.includes(k)?'checked':''}> ${escapeHtml(k)}</label>
            `).join('')}
          </div>
          <div style="display:flex;gap:8px;margin-top:10px;">
            <button class="bb-btn small" id="saveBetriebKatsBtn" style="flex:1;">Speichern</button>
            <button class="bb-btn small secondary" id="cancelBetriebKatsBtn">Abbrechen</button>
          </div>
          <div id="betriebEditMsg"></div>
        `;
        panel.style.display = 'block';

        panel.querySelector('#cancelBetriebKatsBtn').addEventListener('click', ()=>{ panel.style.display='none'; });

        panel.querySelector('#saveBetriebKatsBtn').addEventListener('click', async ()=>{
          const checked = Array.from(panel.querySelectorAll('input:checked')).map(cb=>cb.value);
          const msgEl = panel.querySelector('#betriebEditMsg');
          if(checked.length===0){
            msgEl.innerHTML = '<div class="bb-msg err">Bitte mindestens eine Kategorie auswählen.</div>';
            return;
          }
          const saveBtn = panel.querySelector('#saveBetriebKatsBtn');
          saveBtn.disabled = true; saveBtn.textContent = 'Speichere …';
          const next = state.betriebe.map(b => b.id===betrieb.id ? { ...b, kategorien: checked } : b);
          const result = await storageSetSafe('betriebe', next);
          if(result.ok){
            state.betriebe = next;
            renderStamm();
          } else {
            saveBtn.disabled = false; saveBtn.textContent = 'Speichern';
            msgEl.innerHTML = '<div class="bb-msg err">Speichern fehlgeschlagen. Bitte erneut versuchen.</div>';
          }
        });
      });
    });

    contentEl.querySelectorAll('.bb-del[data-type=betrieb]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        if(!confirm('Betrieb wirklich löschen? Zugehörige Bewegungen bleiben erhalten, verlieren aber die Zuordnung.')) return;
        btn.disabled = true;
        const next = state.betriebe.filter(x=>x.id!==btn.dataset.id);
        const result = await storageSetSafe('betriebe', next);
        if(result.ok){
          state.betriebe = next;
          renderStamm();
        } else {
          btn.disabled = false;
          alert('Löschen fehlgeschlagen. Bitte erneut versuchen.');
        }
      });
    });

    contentEl.querySelectorAll('.bb-del[data-type=kunde]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        if(!confirm('Kunde wirklich löschen?')) return;
        btn.disabled = true;
        const next = state.kunden.filter(x=>x.id!==btn.dataset.id);
        const result = await storageSetSafe('kunden', next);
        if(result.ok){
          state.kunden = next;
          renderStamm();
        } else {
          btn.disabled = false;
          alert('Löschen fehlgeschlagen. Bitte erneut versuchen.');
        }
      });
    });

    const saveBtn = contentEl.querySelector('#saveAnfangBtn');
    if(saveBtn){
      saveBtn.addEventListener('click', async ()=>{
        saveBtn.disabled = true; saveBtn.textContent = 'Speichere …';
        const next = JSON.parse(JSON.stringify(state.anfangsbestand||{}));
        contentEl.querySelectorAll('.anfang-input').forEach(inp=>{
          const bId = inp.dataset.betrieb, kat = inp.dataset.kat;
          if(!next[bId]) next[bId] = {};
          const datumInp = contentEl.querySelector(`.anfang-datum-input[data-betrieb="${bId}"][data-kat="${kat}"]`);
          next[bId][kat] = {
            anzahl: parseInt(inp.value,10) || 0,
            datum: datumInp ? datumInp.value : ''
          };
        });
        const result = await storageSetSafe('anfangsbestand', next);
        saveBtn.disabled = false; saveBtn.textContent = 'Anfangsbestand übernehmen';
        const msg = document.getElementById('anfangMsg');
        if(result.ok){
          state.anfangsbestand = next;
          msg.style.color = 'var(--green-mid)';
          msg.textContent = 'Gespeichert.';
        } else {
          msg.style.color = 'var(--rust)';
          msg.textContent = 'Speichern fehlgeschlagen – bitte erneut versuchen.';
        }
        setTimeout(()=>{ const m=document.getElementById('anfangMsg'); if(m) m.textContent=''; }, 3000);
      });
    }

    contentEl.querySelector('#stammExportBtn').addEventListener('click', exportAllData);
    contentEl.querySelector('#stammImportBtn').addEventListener('click', ()=> importFileInput.click());
  }

  document.querySelectorAll('.bb-tab').forEach(tab=>{
    tab.addEventListener('click', ()=>{ activeTab = tab.dataset.tab; render(); });
  });

  loadAll();
})();
</script>
