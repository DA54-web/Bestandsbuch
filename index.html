<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Bestandsbuch</title>
<style>
  :root{
    --bg:#f5f3ed;
    --card:#ffffff;
    --line:#e2ddd0;
    --ink:#20241f;
    --ink-soft:#5b6058;
    --green:#2b4735;
    --green-dark:#1c3024;
    --amber:#c98a2e;
    --amber-soft:#f4e2c4;
    --red:#b3261e;
    --red-soft:#f6dcda;
    --radius:14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  body{padding-top:calc(var(--safe-top) + 8px);padding-bottom:calc(64px + var(--safe-bottom) + 12px);
    min-height:100vh;}
  input,select,button,textarea{font-size:16px;font-family:inherit;} /* verhindert iOS-Zoom bei Fokus */

  header.top{position:sticky;top:0;z-index:5;background:var(--green);color:#fff;
    padding:calc(var(--safe-top) + 10px) 16px 12px;display:flex;align-items:center;justify-content:space-between;}
  header.top h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.2px;}
  header.top .sync-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:10px;
    padding:8px 12px;font-size:13px;display:flex;align-items:center;gap:6px;}
  header.top .sync-dot{width:8px;height:8px;border-radius:50%;background:#8fd19e;}
  header.top .sync-dot.warn{background:var(--amber);}

  main{padding:12px 14px;max-width:640px;margin:0 auto;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:12px;}
  .card[data-betrieb-link]{touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
  .card[data-betrieb-link]:active{background:var(--bg);}
  .card h2{font-size:15px;margin:0 0 10px;color:var(--green-dark);}
  .row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;
    border-bottom:1px solid var(--line);gap:10px;}
  .row:last-child{border-bottom:none;}
  .row .name{font-weight:600;font-size:15px;}
  .row .sub{color:var(--ink-soft);font-size:13px;margin-top:2px;}
  .amount{font-weight:700;font-size:16px;}
  .amount.pos{color:var(--green-dark);}
  .amount.neg{color:var(--red);}
  .badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;}
  .badge.warn{background:var(--red-soft);color:var(--red);}
  .badge.ok{background:#e0ece3;color:var(--green-dark);}
  .badge.pending{background:var(--amber-soft);color:#8a5a12;}

  label{display:block;font-size:13px;color:var(--ink-soft);margin:10px 0 4px;}
  input[type=text],input[type=number],input[type=date],select,textarea{
    width:100%;padding:12px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);}
  textarea{resize:vertical;min-height:60px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
    padding:13px 16px;border-radius:12px;border:none;font-weight:700;font-size:15px;width:100%;
    min-height:48px;cursor:pointer;touch-action:manipulation;}
  .btn-primary{background:var(--green);color:#fff;}
  .btn-amber{background:var(--amber);color:#fff;}
  .btn-outline{background:transparent;border:1.5px solid var(--green);color:var(--green);}
  .btn-danger{background:var(--red);color:#fff;}
  .btn-sm{padding:9px 12px;font-size:13px;width:auto;min-height:40px;}
  .btn-row{display:flex;gap:8px;margin-top:10px;}
  .btn-row .btn{flex:1;}
  .btn:disabled{opacity:.5;}

  nav.bottom{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);
    display:flex;padding-bottom:var(--safe-bottom);z-index:6;}
  nav.bottom button{flex:1;background:none;border:none;padding:10px 4px 8px;color:var(--ink-soft);
    font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;touch-action:manipulation;}
  nav.bottom button.active{color:var(--green);font-weight:700;}
  nav.bottom .icon{font-size:20px;}

  .empty{text-align:center;color:var(--ink-soft);padding:24px 10px;font-size:14px;}
  .hidden{display:none !important;}

  .toast{position:fixed;bottom:calc(76px + var(--safe-bottom));left:16px;right:16px;background:var(--green-dark);
    color:#fff;padding:12px 16px;border-radius:12px;text-align:center;font-size:14px;z-index:20;
    opacity:0;transform:translateY(10px);transition:.25s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateY(0);}
  .toast.err{background:var(--red);}

  /* Bewegungsart-Auswahl */
  .type-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(92px,1fr));gap:8px;margin:8px 0 4px;}
  .type-btn{padding:12px 6px;border-radius:10px;border:1.5px solid var(--line);background:#fff;
    font-weight:700;font-size:13px;text-align:center;color:var(--ink-soft);cursor:pointer;touch-action:manipulation;}
  .type-btn.pos.active{background:var(--green);color:#fff;border-color:var(--green);}
  .type-btn.neg.active{background:var(--red);color:#fff;border-color:var(--red);}

  /* Stückzahl-Wippe */
  .stepper{display:flex;align-items:center;gap:10px;margin-top:4px;}
  .stepper button{width:48px;height:48px;flex-shrink:0;border-radius:10px;border:1.5px solid var(--green);
    background:#fff;color:var(--green);font-size:24px;font-weight:700;line-height:1;cursor:pointer;touch-action:manipulation;}
  .stepper input{flex:1;text-align:center;font-weight:700;font-size:22px;min-height:48px;}
  .chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
  .chip{border:1px solid var(--line);background:#fff;border-radius:16px;padding:8px 15px;
    font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer;touch-action:manipulation;}

  /* Checkbox-Zeilen (z.B. Kategorien-Auswahl je Betrieb) */
  .check-row{display:flex;align-items:center;gap:10px;padding:10px 2px;border-bottom:1px solid var(--line);}
  .check-row:last-child{border-bottom:none;}
  .check-row input{width:20px;height:20px;flex-shrink:0;accent-color:var(--green);}

  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px;}
  .filters select, .filters input{flex:1;min-width:120px;padding:9px 10px;font-size:13px;}

  .anfang-line{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);}
  .anfang-line:last-child{border-bottom:none;}
  .anfang-line .name{flex:1 1 100%;font-weight:600;font-size:14px;}
  .anfang-line input{flex:1;min-width:110px;}
</style>
</head>
<body>

<header class="top">
  <h1>🐖 Bestandsbuch</h1>
  <button class="sync-btn" id="syncBtn"><span class="sync-dot" id="syncDot"></span><span id="syncLabel">Sync</span></button>
</header>

<main id="main"></main>

<nav class="bottom">
  <button data-view="bestand" class="active"><span class="icon">📦</span>Bestand</button>
  <button data-view="erfassen"><span class="icon">✍️</span>Erfassen</button>
  <button data-view="historie"><span class="icon">📋</span>Historie</button>
  <button data-view="stamm"><span class="icon">⚙️</span>Stammdaten</button>
</nav>

<div class="toast" id="toast"></div>
<input type="file" id="importFileInput" accept="application/json" style="display:none">

<script>
/* ============================================================
   KONFIGURATION - hier die Web-App-URL deines Google Apps Script eintragen
   ============================================================ */
const SHEET_API_URL = 'https://script.google.com/macros/s/AKfycbyrKbtQ7W0dMgs-O07Umpf1ibH2FYT3-sYElklgP1krB5mAs_rNFhquqhY8mug7cIsPJw/exec';
const SYNC_INTERVAL_MS = 22000;

let KATEGORIEN = ['Sauen','Saugferkel','Eber','Ferkel Flatdeck','Mastschweine']; // Startwert, wird nach dem ersten Sync durch state.kategorien ersetzt
const ARTEN = [
  {id:'geburt',  label:'Geburt',  sign:1,  partnerLabel:null},
  {id:'zukauf',  label:'Zukauf',  sign:1,  partnerLabel:'Herkunft'},
  {id:'zugang',  label:'Zugang',  sign:1,  partnerLabel:'Herkunft'},
  {id:'abgang',  label:'Abgang',  sign:-1, partnerLabel:'Abnehmer'},
  {id:'verlust', label:'Verlust', sign:-1, partnerLabel:'Abnehmer'},
];
const artById = id => ARTEN.find(a=>a.id===id);

/* ============================================================
   STATE
   ============================================================ */
let state = { betriebe: [], kunden: [], bewegungen: [], anfangsbestand: {}, view: 'bestand' };
let loaded = false;
let formArt = null; // keine Bewegungsart vorausgewählt - muss bewusst gewählt werden
let editingId = null;
let draft = null; // hält Formularwerte über einen Bewegungsart-Wechsel hinweg fest
let historieFilter = { betriebId:'', kategorie:'', art:'', von:'', bis:'' };
let openBetriebPanel = null;

function uid(){ return (crypto.randomUUID ? crypto.randomUUID() : 'id-'+Date.now()+'-'+Math.random().toString(16).slice(2)); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function formatDatum(iso){ if(!iso) return '–'; const [y,m,d]=iso.split('-'); return d+'.'+m+'.'+y; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }

/* ============================================================
   ROBUSTE FETCH-HELFER (mit Wiederholungsversuchen)
   ============================================================ */
async function apiGet(key){
  const url = SHEET_API_URL + '?action=get&key=' + encodeURIComponent(key) + '&_=' + Date.now();
  for(let attempt=0; attempt<4; attempt++){
    try{
      const res = await fetch(url);
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      if(!json.ok) throw new Error(json.error || 'API-Fehler');
      return json.value;
    }catch(err){
      if(attempt===3) throw err;
      await sleep(400 * Math.pow(2, attempt));
    }
  }
}

async function apiSet(key, value){
  for(let attempt=0; attempt<4; attempt++){
    try{
      // Content-Type text/plain vermeidet einen CORS-Preflight, den Apps Script nicht beantwortet.
      const res = await fetch(SHEET_API_URL, {
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify({ key, value }),
      });
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      if(!json.ok) throw new Error(json.error || 'API-Fehler');
      return true;
    }catch(err){
      if(attempt===3) throw err;
      await sleep(400 * Math.pow(2, attempt));
    }
  }
}

/* ============================================================
   SYNC
   ============================================================ */
function setSyncStatus(status){
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  if(status==='ok'){ dot.className='sync-dot'; label.textContent='Sync'; }
  else if(status==='laedt'){ dot.className='sync-dot warn'; label.textContent='…'; }
  else { dot.className='sync-dot warn'; label.textContent='Fehler'; }
}

function toast(msg, isErr){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=> t.classList.remove('show'), 2600);
}

const DEFAULTS = { betriebe: [], kunden: [], bewegungen: [], anfangsbestand: {}, kategorien: ['Sauen','Saugferkel','Eber','Ferkel Flatdeck','Mastschweine'] };

async function syncData(showToast, isPeriodic){
  if(!SHEET_API_URL){
    document.getElementById('main').innerHTML = `<div class="card"><div class="empty">
      <b>Noch nicht eingerichtet.</b><br><br>
      Trage die Zeile <code>const SHEET_API_URL = '...'</code> mit deiner
      Google-Apps-Script-URL ein (siehe Anleitung).</div></div>`;
    setSyncStatus('fehler');
    return;
  }
  setSyncStatus('laedt');
  const isFirstLoad = !loaded;
  try{
    const keys = ['betriebe','kunden','bewegungen','anfangsbestand','kategorien'];
    const results = await Promise.all(keys.map(async k => {
      try{ return { key:k, ok:true, value: await apiGet(k) }; }
      catch(err){ return { key:k, ok:false, error:err }; }
    }));
    let anyRealFail = false;
    for(const r of results){
      let value;
      if(r.ok){
        value = r.value ?? DEFAULTS[r.key];
      } else if(isFirstLoad){
        // Beim allerersten Zugriff meldet ein noch nie gespeicherter Schlüssel
        // ebenfalls einen Fehler - das ist normal, kein echter Ausfall.
        value = DEFAULTS[r.key];
        apiSet(r.key, value).catch(()=>{});
      } else {
        anyRealFail = true;
        continue;
      }
      if(r.key === 'kategorien') KATEGORIEN = value;
      else state[r.key] = value;
    }
    loaded = true;
    setSyncStatus(anyRealFail ? 'fehler' : 'ok');
    if(!isPeriodic) render();
    if(showToast) toast(anyRealFail ? 'Teilweise nicht aktualisiert' : 'Aktualisiert', anyRealFail);
  }catch(err){
    setSyncStatus('fehler');
    if(showToast) toast('Sync fehlgeschlagen', true);
    // WICHTIG: bei Fehler bleiben die zuletzt bekannten Daten unverändert (kein leeres Überschreiben)
  }
}

document.getElementById('syncBtn').addEventListener('click', ()=> syncData(true, false));
setInterval(()=> syncData(false, true), SYNC_INTERVAL_MS);

/* ============================================================
   BERECHNUNGEN
   ============================================================ */
function betriebKategorien(betrieb){
  if(!betrieb || !Array.isArray(betrieb.kategorien) || betrieb.kategorien.length===0) return KATEGORIEN;
  return KATEGORIEN.filter(k => betrieb.kategorien.includes(k));
}

function getAnfangsbestand(betriebId, kategorie){
  const raw = state.anfangsbestand[betriebId] && state.anfangsbestand[betriebId][kategorie];
  if(raw && typeof raw === 'object') return { anzahl: raw.anzahl || 0, datum: raw.datum || '' };
  return { anzahl: raw || 0, datum: '' };
}

function currentStock(betriebId, kategorie){
  let sum = getAnfangsbestand(betriebId, kategorie).anzahl;
  for(const b of state.bewegungen){
    if(b.betriebId===betriebId && b.kategorie===kategorie){
      const art = artById(b.art);
      sum += (art ? art.sign : 0) * b.anzahl;
    }
  }
  return sum;
}

function betriebName(id){ const b = state.betriebe.find(x=>x.id===id); return b ? b.name : '–'; }
function kundeName(id){ if(!id) return '–'; const k = state.kunden.find(x=>x.id===id); return k ? k.name : '–'; }

/* ============================================================
   RENDER: ROUTER
   ============================================================ */
function render(){
  document.querySelectorAll('nav.bottom button').forEach(b=> b.classList.toggle('active', b.dataset.view===state.view));
  const main = document.getElementById('main');
  if(state.view==='bestand') main.innerHTML = renderBestand();
  else if(state.view==='erfassen') main.innerHTML = renderErfassen();
  else if(state.view==='historie') main.innerHTML = renderHistorie();
  else if(state.view==='stamm') main.innerHTML = renderStamm();
  attachHandlers();
}

document.querySelectorAll('nav.bottom button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    if(btn.dataset.view==='erfassen' && !editingId){
      // Frischer Einstieg ins Erfassen-Formular: keine Bewegungsart vorbelegen,
      // damit nichts versehentlich mit Standardwerten abgeschickt wird.
      formArt = null;
      draft = null;
    }
    state.view = btn.dataset.view;
    render();
  });
});

/* ---------- BESTAND ---------- */
function renderBestand(){
  if(state.betriebe.length===0){
    return `<div class="card"><div class="empty">Noch kein Betrieb angelegt.<br>Lege unter „Stammdaten" deinen ersten Betrieb an.</div></div>`;
  }
  return state.betriebe.map(betrieb=>{
    let total = 0;
    const rows = betriebKategorien(betrieb).map(kat=>{
      const val = currentStock(betrieb.id, kat);
      total += val;
      return `<div class="row"><div class="name">${escapeHtml(kat)}</div><div class="amount">${val}</div></div>`;
    }).join('');
    return `<div class="card" data-betrieb-link="${betrieb.id}" style="cursor:pointer;">
      <h2 style="display:flex;justify-content:space-between;align-items:center;">
        <span>${escapeHtml(betrieb.name)} <span class="badge ok">${total} gesamt</span></span>
        <span style="color:var(--ink-soft);font-weight:400;font-size:13px;">Historie ›</span>
      </h2>
      ${rows}
    </div>`;
  }).join('');
}

/* ---------- ERFASSEN ---------- */
function katOptionsFor(betriebId, selectedKat){
  const betrieb = state.betriebe.find(b=>b.id===betriebId);
  return betriebKategorien(betrieb).map(k=>`<option value="${k}" ${selectedKat===k?'selected':''}>${escapeHtml(k)}</option>`).join('');
}

function renderErfassen(){
  if(state.betriebe.length===0){
    return `<div class="card"><div class="empty">Lege zuerst unter „Stammdaten" einen Betrieb an.</div></div>`;
  }
  const editing = editingId ? state.bewegungen.find(b=>b.id===editingId) : null;
  if(editingId && !editing) editingId = null;

  // Ohne bewusst gewählte Bewegungsart wird nur die Auswahl gezeigt - kein Rest-Formular,
  // das versehentlich mit Standardwerten abgeschickt werden könnte.
  if(!editing && !formArt){
    const typeButtonsOnly = ARTEN.map(a=>`
      <button type="button" class="type-btn ${a.sign>0?'pos':'neg'}" data-art="${a.id}">${a.label}</button>
    `).join('');
    return `
      <div class="card">
        <h2>Neue Bewegung erfassen</h2>
        <label>Bewegungsart</label>
        <div class="type-grid">${typeButtonsOnly}</div>
        <div class="empty" style="padding-top:16px;">Bitte zuerst eine Bewegungsart auswählen.</div>
      </div>
    `;
  }

  const art = artById(editing ? editing.art : formArt);
  const needsPartner = !!art.partnerLabel;
  const d = (!editing && draft) ? draft : null;

  const typeButtons = ARTEN.map(a=>`
    <button type="button" class="type-btn ${a.sign>0?'pos':'neg'} ${a.id===formArt?'active':''}" data-art="${a.id}">${a.label}</button>
  `).join('');

  const selectedBetriebId = editing ? editing.betriebId : (d && d.betriebId) ? d.betriebId : state.betriebe[0].id;
  const betriebOptions = state.betriebe.map(b=>`<option value="${b.id}" ${selectedBetriebId===b.id?'selected':''}>${escapeHtml(b.name)}</option>`).join('');
  const selectedKat = editing ? editing.kategorie : (d && d.kategorie) ? d.kategorie : null;
  const katOptions = katOptionsFor(selectedBetriebId, selectedKat);
  const selectedPartnerId = editing ? editing.partnerId : (d && d.partnerId) ? d.partnerId : '';
  const kundenOptions = '<option value="">– bitte wählen –</option>' + state.kunden.map(k=>`<option value="${k.id}" ${selectedPartnerId===k.id?'selected':''}>${escapeHtml(k.name)}</option>`).join('');

  const startAnzahl = editing ? editing.anzahl : (d && d.anzahl) ? d.anzahl : 1;
  const startDatum = editing ? editing.datum : (d && d.datum) ? d.datum : todayISO();
  const startNotiz = editing ? (editing.notiz||'') : (d && d.notiz) ? d.notiz : '';

  const showInternOption = (formArt==='abgang' && !editing && state.betriebe.length > 1);
  const zielBetriebe = state.betriebe.filter(b=>b.id!==selectedBetriebId);
  const zielBetriebOptions = zielBetriebe.map(b=>`<option value="${b.id}">${escapeHtml(b.name)}</option>`).join('');
  const zielKatOptions = zielBetriebe.length ? katOptionsFor(zielBetriebe[0].id, null) : '';

  return `
    <div class="card">
      <h2>${editing ? 'Bewegung bearbeiten' : 'Neue Bewegung erfassen'}</h2>
      ${editing ? `<div class="badge pending" style="margin-bottom:10px;">bearbeitet Eintrag vom ${formatDatum(editing.datum)}</div>` : ''}
      <label>Bewegungsart</label>
      <div class="type-grid">${typeButtons}</div>

      <label>Datum</label>
      <input type="date" id="fDatum" value="${startDatum}">

      <label>Betrieb</label>
      <select id="fBetrieb">${betriebOptions}</select>

      <label>Kategorie</label>
      <select id="fKategorie">${katOptions}</select>

      <label>Anzahl</label>
      <div class="stepper">
        <button type="button" id="anzahlMinus">−</button>
        <input type="number" id="fAnzahl" min="1" step="1" value="${startAnzahl}" inputmode="numeric">
        <button type="button" id="anzahlPlus">+</button>
      </div>
      <div class="chip-row">
        ${[1,2,3,5,10,12].map(n=>`<button type="button" class="chip" data-n="${n}">${n}</button>`).join('')}
      </div>

      ${showInternOption ? `
      <label class="check-row" style="margin-top:14px;">
        <input type="checkbox" id="fInternToggle"> Intern umstallen – gleichzeitig bei einem anderen Betrieb einbuchen
      </label>
      ` : ''}

      <div id="partnerBlock" style="${needsPartner ? '' : 'display:none;'}">
        ${needsPartner ? `
        <label>${art.partnerLabel}</label>
        <select id="fPartner" ${state.kunden.length?'':'disabled'}>${kundenOptions}</select>
        ${state.kunden.length ? '' : '<div class="sub" style="margin-top:4px;">Noch keine Kunden angelegt – unter Stammdaten hinzufügen.</div>'}
        ` : ''}
      </div>

      ${showInternOption ? `
      <div id="internBlock" style="display:none;">
        ${zielBetriebe.length ? `
        <label>Ziel-Betrieb</label>
        <select id="fZielBetrieb">${zielBetriebOptions}</select>
        <label>Ziel-Kategorie</label>
        <select id="fZielKategorie">${zielKatOptions}</select>
        ` : '<div class="sub" style="margin-top:4px;">Kein weiterer Betrieb vorhanden – lege unter Stammdaten einen zweiten Betrieb an.</div>'}
      </div>
      ` : ''}

      <label>Notiz (optional)</label>

/* ---------- HISTORIE ---------- */
function filteredBewegungen(){
  return state.bewegungen.filter(b=>{
    if(historieFilter.betriebId && b.betriebId!==historieFilter.betriebId) return false;
    if(historieFilter.kategorie && b.kategorie!==historieFilter.kategorie) return false;
    if(historieFilter.art && b.art!==historieFilter.art) return false;
    if(historieFilter.von && b.datum < historieFilter.von) return false;
    if(historieFilter.bis && b.datum > historieFilter.bis) return false;
    return true;
  }).sort((a,b)=> b.datum.localeCompare(a.datum));
}

// Berechnet für jede Bewegung den Bestand unmittelbar davor und danach
// (je Betrieb + Kategorie, in tatsächlicher chronologischer Reihenfolge -
// unabhängig von der Sortierung der Anzeige). Ergebnis: {bewegungId: {vorher, nachher}}
function buildVerlaufIndex(){
  const byBetrieb = {};
  for(const b of state.bewegungen){
    if(!byBetrieb[b.betriebId]) byBetrieb[b.betriebId] = {};
    if(!byBetrieb[b.betriebId][b.kategorie]) byBetrieb[b.betriebId][b.kategorie] = [];
    byBetrieb[b.betriebId][b.kategorie].push(b);
  }
  const index = {};
  for(const betriebId in byBetrieb){
    for(const kategorie in byBetrieb[betriebId]){
      const sortiert = byBetrieb[betriebId][kategorie].slice().sort((a,b)=> a.datum.localeCompare(b.datum));
      let laufend = getAnfangsbestand(betriebId, kategorie).anzahl;
      for(const b of sortiert){
        const art = artById(b.art);
        const vorher = laufend;
        laufend += (art ? art.sign : 0) * b.anzahl;
        index[b.id] = { vorher, nachher: laufend };
      }
    }
  }
  return index;
}

function renderHistorie(){
  const betriebOptions = '<option value="">Alle Betriebe</option>' + state.betriebe.map(b=>`<option value="${b.id}" ${historieFilter.betriebId===b.id?'selected':''}>${escapeHtml(b.name)}</option>`).join('');
  const katOptions = '<option value="">Alle Kategorien</option>' + KATEGORIEN.map(k=>`<option value="${k}" ${historieFilter.kategorie===k?'selected':''}>${escapeHtml(k)}</option>`).join('');
  const artOptions = '<option value="">Alle Bewegungsarten</option>' + ARTEN.map(a=>`<option value="${a.id}" ${historieFilter.art===a.id?'selected':''}>${a.label}</option>`).join('');

  const rows = filteredBewegungen();
  const verlauf = buildVerlaufIndex();
  const cards = rows.map(b=>{
    const art = artById(b.art);
    const partnerLine = (art.partnerLabel && b.partnerId) ? `<div class="sub">${art.partnerLabel}: ${escapeHtml(kundeName(b.partnerId))}</div>` : '';
    const notizLine = b.notiz ? `<div class="sub">„${escapeHtml(b.notiz)}"</div>` : '';
    const v = verlauf[b.id] || { vorher:'–', nachher:'–' };
    const verlaufLine = `<div class="sub">Bestand: ${v.vorher} → ${v.nachher}</div>`;
    return `
    <div class="row" style="flex-wrap:wrap;">
      <div>
        <div class="name">${art.label}</div>
        <div class="sub">${formatDatum(b.datum)} · ${escapeHtml(betriebName(b.betriebId))} · ${escapeHtml(b.kategorie)}</div>
        ${verlaufLine}
        ${partnerLine}
        ${notizLine}
      </div>
      <div style="text-align:right;">
        <div class="amount ${art.sign>0?'pos':'neg'}">${art.sign>0?'+':'−'}${b.anzahl}</div>
      </div>
      <div class="btn-row" style="width:100%;margin-top:8px;">
        <button class="btn btn-sm btn-outline" data-edit-id="${b.id}">✎ Bearbeiten</button>
        <button class="btn btn-sm btn-danger" data-delete-id="${b.id}">✕ Löschen</button>
      </div>
    </div>`;
  }).join('') || '<div class="empty">Keine Bewegungen gefunden.</div>';

  return `
    <div class="card">
      <h2>Filter</h2>
      <div class="filters">
        <select id="fltBetrieb">${betriebOptions}</select>
        <select id="fltKategorie">${katOptions}</select>
      </div>
      <div class="filters" style="margin-top:8px;">
        <select id="fltArt">${artOptions}</select>
        <input type="date" id="fltVon" value="${historieFilter.von}" title="Von">
        <input type="date" id="fltBis" value="${historieFilter.bis}" title="Bis">
      </div>
      <button class="btn btn-outline" style="margin-top:10px;" id="exportCsvBtn">CSV exportieren</button>
    </div>
    <div class="card">
      <h2>Bewegungshistorie</h2>
      ${cards}
    </div>
  `;
}

/* ============================================================
   SICHERUNG (Export/Import als Datei)
   ============================================================ */
function buildBackupPayload(){
  return {
    typ:'bestandsbuch-sicherung', version:2, exportiertAm:new Date().toISOString(),
    betriebe: state.betriebe, kunden: state.kunden, bewegungen: state.bewegungen,
    anfangsbestand: state.anfangsbestand, kategorien: KATEGORIEN,
  };
}

async function exportAllData(){
  const json = JSON.stringify(buildBackupPayload(), null, 2);
  const filename = 'bestandsbuch_sicherung_' + todayISO() + '.json';
  try{
    if(navigator.canShare && navigator.share){
      const file = new File([json], filename, {type:'application/json'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title:'Bestandsbuch Sicherung'});
        return;
      }
    }
  }catch(e){ /* Nutzer hat abgebrochen oder Teilen schlug fehl - Fallback unten */ }

  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const win = window.open(url, '_blank');
  if(!win){
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }
  setTimeout(()=>URL.revokeObjectURL(url), 30000);
}

function importAllDataFromFile(file){
  const reader = new FileReader();
  reader.onload = async () => {
    try{
      const data = JSON.parse(reader.result);
      if(!data || typeof data !== 'object') throw new Error('Ungültiges Format');
      if(!confirm('Aktuelle Daten werden durch die Sicherungsdatei ersetzt (auch in der Cloud). Fortfahren?')) return;
      const next = {
        betriebe: Array.isArray(data.betriebe) ? data.betriebe : [],
        kunden: Array.isArray(data.kunden) ? data.kunden : [],
        bewegungen: Array.isArray(data.bewegungen) ? data.bewegungen : [],
        anfangsbestand: (data.anfangsbestand && typeof data.anfangsbestand==='object') ? data.anfangsbestand : {},
      };
      const nextKategorien = Array.isArray(data.kategorien) && data.kategorien.length ? data.kategorien : KATEGORIEN;
      await Promise.all([
        apiSet('betriebe', next.betriebe), apiSet('kunden', next.kunden),
        apiSet('bewegungen', next.bewegungen), apiSet('anfangsbestand', next.anfangsbestand),
        apiSet('kategorien', nextKategorien),
      ]);
      state = Object.assign(state, next);
      KATEGORIEN = nextKategorien;
      render();
      toast('Sicherung geladen und synchronisiert');
    }catch(e){
      toast('Datei konnte nicht gelesen werden', true);
    }
  };
  reader.readAsText(file);
}

const importFileInput = document.getElementById('importFileInput');
importFileInput.addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(file) importAllDataFromFile(file);
  importFileInput.value = '';
});

   HANDLER (nach jedem render() neu verdrahtet)

  if(state.view==='bestand') attachBestandHandlers();
  else if(state.view==='erfassen') attachErfassenHandlers();
  else if(state.view==='historie') attachHistorieHandlers();

  const exportBtn = document.getElementById('stammExportBtn');
  if(exportBtn) exportBtn.addEventListener('click', exportAllData);

  if(importBtn) importBtn.addEventListener('click', ()=> importFileInput.click());
}

function captureDraft(){
  const betriebSel = document.getElementById('fBetrieb');
  if(!betriebSel) return null;
  return {
    betriebId: betriebSel.value,
    kategorie: document.getElementById('fKategorie').value,
    partnerId: document.getElementById('fPartner') ? document.getElementById('fPartner').value : '',
    anzahl: parseInt(document.getElementById('fAnzahl').value,10) || 1,
    datum: document.getElementById('fDatum').value,
    notiz: document.getElementById('fNotiz').value || '',
  };
}

function attachErfassenHandlers(){
  document.querySelectorAll('.type-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      draft = captureDraft();
      formArt = btn.dataset.art;
      render();
    });
  });

  const betriebSel = document.getElementById('fBetrieb');
  const zielBetriebSel = document.getElementById('fZielBetrieb');
  const zielKatSel = document.getElementById('fZielKategorie');

  function refreshZielOptions(){
    if(!zielBetriebSel) return;
    const sourceId = betriebSel.value;
    const zielBetriebe = state.betriebe.filter(b=>b.id!==sourceId);
    zielBetriebSel.innerHTML = zielBetriebe.map(b=>`<option value="${b.id}">${escapeHtml(b.name)}</option>`).join('');
    if(zielKatSel && zielBetriebe.length) zielKatSel.innerHTML = katOptionsFor(zielBetriebe[0].id, null);
  }

  if(betriebSel){
    betriebSel.addEventListener('change', (e)=>{
      document.getElementById('fKategorie').innerHTML = katOptionsFor(e.target.value, null);
      refreshZielOptions();
    });
  }
  if(zielBetriebSel && zielKatSel){
    zielBetriebSel.addEventListener('change', (e)=>{
      zielKatSel.innerHTML = katOptionsFor(e.target.value, null);
    });
  }

  const internToggle = document.getElementById('fInternToggle');
  if(internToggle){
    internToggle.addEventListener('change', ()=>{
      const partnerBlock = document.getElementById('partnerBlock');
      const internBlock = document.getElementById('internBlock');
      if(internToggle.checked){
        partnerBlock.style.display = 'none';
        internBlock.style.display = '';
      } else {
        partnerBlock.style.display = '';
        internBlock.style.display = 'none';
      }
    });
  }

  const anzahlInput = document.getElementById('fAnzahl');
  const minus = document.getElementById('anzahlMinus');
  const plus = document.getElementById('anzahlPlus');
  if(minus) minus.addEventListener('click', ()=>{ anzahlInput.value = Math.max(1, (parseInt(anzahlInput.value,10)||1) - 1); });
  if(plus) plus.addEventListener('click', ()=>{ anzahlInput.value = (parseInt(anzahlInput.value,10)||0) + 1; });
  document.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click', ()=>{ anzahlInput.value = chip.dataset.n; });
  });

  const cancelBtn = document.getElementById('cancelEditBtn');
  if(cancelBtn) cancelBtn.addEventListener('click', ()=>{ editingId = null; draft = null; formArt = null; render(); });

  const submitBtn = document.getElementById('submitBewegungBtn');
  if(submitBtn) submitBtn.addEventListener('click', async ()=>{
    const editing = editingId ? state.bewegungen.find(b=>b.id===editingId) : null;
    const art = artById(formArt);
    const needsPartner = !!art.partnerLabel;
    const internActive = !!(document.getElementById('fInternToggle') && document.getElementById('fInternToggle').checked);

    const betriebId = document.getElementById('fBetrieb').value;
    const kategorie = document.getElementById('fKategorie').value;
    const anzahl = parseInt(document.getElementById('fAnzahl').value,10);
    const datum = document.getElementById('fDatum').value;
    const notiz = (document.getElementById('fNotiz').value || '').trim();

    if(!anzahl || anzahl<1){ toast('Bitte eine Anzahl größer 0 angeben.', true); return; }

    let next;

    if(internActive){
      const zielBetriebEl = document.getElementById('fZielBetrieb');
      const zielKatEl = document.getElementById('fZielKategorie');
      if(!zielBetriebEl || !zielKatEl){ toast('Kein weiterer Betrieb vorhanden.', true); return; }
      const zielBetriebId = zielBetriebEl.value;
      const zielKategorie = zielKatEl.value;
      if(!zielBetriebId || !zielKategorie){ toast('Bitte Ziel-Betrieb und Ziel-Kategorie auswählen.', true); return; }

      const quellName = betriebName(betriebId);
      const zielName = betriebName(zielBetriebId);
      const abgangNotiz = `Interner Umstall → ${zielName} (${zielKategorie})` + (notiz ? ' – ' + notiz : '');
      const zugangNotiz = `Interner Umstall ← ${quellName} (${kategorie})` + (notiz ? ' – ' + notiz : '');

      const abgangRecord = { id: uid(), datum, betriebId, kategorie, art: formArt, anzahl, partnerId: null, notiz: abgangNotiz };
      const zugangRecord = { id: uid(), datum, betriebId: zielBetriebId, kategorie: zielKategorie, art: 'zugang', anzahl, partnerId: null, notiz: zugangNotiz };
      next = [...state.bewegungen, abgangRecord, zugangRecord];
    } else {
      const partnerId = document.getElementById('fPartner') ? (document.getElementById('fPartner').value || null) : null;
      const isInternLeg = editing && editing.notiz && editing.notiz.startsWith('Interner Umstall');
      if(needsPartner && !partnerId && !isInternLeg){ toast('Bitte ' + art.partnerLabel + ' auswählen.', true); return; }

      if(editing){
        next = state.bewegungen.map(b => b.id===editing.id ? {...b, datum, betriebId, kategorie, art:formArt, anzahl, partnerId, notiz} : b);
      } else {
        next = [...state.bewegungen, { id: uid(), datum, betriebId, kategorie, art: formArt, anzahl, partnerId, notiz }];
      }
    }

    submitBtn.disabled = true; submitBtn.textContent = 'Speichere …';

    try{
      await apiSet('bewegungen', next);
      state.bewegungen = next;
      if(editing){
        editingId = null; draft = null; formArt = null;
        state.view = 'historie';
        toast('Änderungen gespeichert');
        render();
      } else {
        draft = null;
        toast(internActive ? 'Abgang gebucht und bei Zielbetrieb eingebucht' : 'Bewegung gespeichert');
        render();
      }
    }catch(err){
      toast('Speichern fehlgeschlagen – bitte erneut versuchen', true);
      submitBtn.disabled = false; submitBtn.textContent = editing ? 'Änderungen speichern' : 'Bewegung speichern';
    }
  });
}

function attachHistorieHandlers(){
  document.getElementById('fltBetrieb').addEventListener('change', e=>{ historieFilter.betriebId = e.target.value; render(); });
  document.getElementById('fltKategorie').addEventListener('change', e=>{ historieFilter.kategorie = e.target.value; render(); });
  document.getElementById('fltArt').addEventListener('change', e=>{ historieFilter.art = e.target.value; render(); });
  document.getElementById('fltVon').addEventListener('change', e=>{ historieFilter.von = e.target.value; render(); });
  document.getElementById('fltBis').addEventListener('change', e=>{ historieFilter.bis = e.target.value; render(); });

  document.querySelectorAll('[data-edit-id]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const entry = state.bewegungen.find(x=>x.id===btn.dataset.editId);
      if(!entry) return;
      editingId = entry.id; formArt = entry.art; draft = null;
      state.view = 'erfassen';
      render();
    });
  });

  document.querySelectorAll('[data-delete-id]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      if(!confirm('Diese Bewegung wirklich löschen?')) return;
      btn.disabled = true;
      const next = state.bewegungen.filter(x=>x.id!==btn.dataset.deleteId);
      try{
        await apiSet('bewegungen', next);
        state.bewegungen = next;
        toast('Gelöscht');
        render();
      }catch(err){
        btn.disabled = false;
        toast('Löschen fehlgeschlagen', true);
      }
    });
  });

  document.getElementById('exportCsvBtn').addEventListener('click', ()=>{
    const data = filteredBewegungen();
    const header = ['Datum','Betrieb','Kategorie','Bewegungsart','Anzahl','Herkunft/Abnehmer','Notiz'];
    const csvRows = [header.join(';')];
    for(const b of data){
      const art = artById(b.art);
      csvRows.push([
        formatDatum(b.datum), betriebName(b.betriebId), b.kategorie, art.label,
        (art.sign>0?'+':'-')+b.anzahl, kundeName(b.partnerId),
        (b.notiz||'').replace(/;/g,',').replace(/\n/g,' ')
      ].join(';'));
    }
    const csv = '\uFEFF' + csvRows.join('\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'bewegungen_' + todayISO() + '.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
}

function attachStammHandlers(){
  document.getElementById('addKategorieBtn').addEventListener('click', async ()=>{
    const input = document.getElementById('newKategorie');
    const btn = document.getElementById('addKategorieBtn');
    const name = input.value.trim();
    if(!name) return;
    if(KATEGORIEN.includes(name)){ toast('Diese Kategorie gibt es schon.', true); return; }
    btn.disabled = true; btn.textContent = 'Speichere …';
    const next = [...KATEGORIEN, name];
    try{
      await apiSet('kategorien', next);
      KATEGORIEN = next;
      toast('Kategorie angelegt');
      render();
    }catch(err){
      btn.disabled = false; btn.textContent = 'Hinzufügen';
      toast('Speichern fehlgeschlagen', true);
    }
  });

  document.querySelectorAll('[data-delete-kat]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      if(!confirm('Kategorie „' + btn.dataset.deleteKat + '" wirklich löschen? Sie verschwindet dann aus allen Betrieben und Auswahlfeldern; bereits erfasste Bewegungen mit dieser Kategorie bleiben in der Historie erhalten.')) return;
      btn.disabled = true;
      const next = KATEGORIEN.filter(k=>k!==btn.dataset.deleteKat);
      try{
        await apiSet('kategorien', next);
        KATEGORIEN = next;
        toast('Kategorie gelöscht');
        render();
      }catch(err){
        btn.disabled = false;
        toast('Löschen fehlgeschlagen', true);
      }
    });
  });

  document.getElementById('addBetriebBtn').addEventListener('click', async ()=>{
    const input = document.getElementById('newBetrieb');
    const btn = document.getElementById('addBetriebBtn');
    const name = input.value.trim();
    if(!name) return;
    const checked = Array.from(document.querySelectorAll('.new-kat-check:checked')).map(cb=>cb.value);
    if(checked.length===0){ toast('Bitte mindestens eine Kategorie auswählen.', true); return; }
    btn.disabled = true; btn.textContent = 'Speichere …';
    const next = [...state.betriebe, {id: uid(), name, kategorien: checked}];
    try{
      await apiSet('betriebe', next);
      state.betriebe = next;
      toast('Betrieb angelegt');
      render();
    }catch(err){
      btn.disabled = false; btn.textContent = 'Betrieb hinzufügen';
      toast('Speichern fehlgeschlagen', true);
    }
  });

  document.getElementById('addKundeBtn').addEventListener('click', async ()=>{
    const input = document.getElementById('newKunde');
    const btn = document.getElementById('addKundeBtn');
    const name = input.value.trim();
    if(!name) return;
    btn.disabled = true;
    const next = [...state.kunden, {id: uid(), name}];
    try{
      await apiSet('kunden', next);
      state.kunden = next;
      toast('Kunde angelegt');
      render();
    }catch(err){
      btn.disabled = false;
      toast('Speichern fehlgeschlagen', true);
    }
  });

  document.querySelectorAll('[data-delete-betrieb]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      if(!confirm('Betrieb wirklich löschen? Zugehörige Bewegungen bleiben erhalten, verlieren aber die Zuordnung.')) return;
      btn.disabled = true;
      const next = state.betriebe.filter(x=>x.id!==btn.dataset.deleteBetrieb);
      try{
        await apiSet('betriebe', next);
        state.betriebe = next;
        toast('Betrieb gelöscht');
        render();
      }catch(err){
        btn.disabled = false;
        toast('Löschen fehlgeschlagen', true);
      }
    });
  });

  document.querySelectorAll('[data-delete-kunde]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      if(!confirm('Kunde wirklich löschen?')) return;
      btn.disabled = true;
      const next = state.kunden.filter(x=>x.id!==btn.dataset.deleteKunde);
      try{
        await apiSet('kunden', next);
        state.kunden = next;
        toast('Kunde gelöscht');
        render();
      }catch(err){
        btn.disabled = false;
        toast('Löschen fehlgeschlagen', true);
      }
    });
  });

  document.querySelectorAll('[data-edit-betrieb]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      openBetriebPanel = (openBetriebPanel === btn.dataset.editBetrieb) ? null : btn.dataset.editBetrieb;
      render();
    });
  });
  document.querySelectorAll('[data-cancel-betrieb-edit]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ openBetriebPanel = null; render(); });
  });
  document.querySelectorAll('[data-save-betrieb-kats]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const betriebId = btn.dataset.saveBetriebKats;
      const checked = Array.from(document.querySelectorAll('.edit-kat-check:checked')).map(cb=>cb.value);
      if(checked.length===0){ toast('Bitte mindestens eine Kategorie auswählen.', true); return; }
      btn.disabled = true;
      const next = state.betriebe.map(b => b.id===betriebId ? {...b, kategorien:checked} : b);
      try{
        await apiSet('betriebe', next);
        state.betriebe = next;
        openBetriebPanel = null;
        toast('Kategorien aktualisiert');
        render();
      }catch(err){
        btn.disabled = false;
        toast('Speichern fehlgeschlagen', true);
      }
    });
  });

  const saveAnfangBtn = document.getElementById('saveAnfangBtn');
  if(saveAnfangBtn){
    saveAnfangBtn.addEventListener('click', async ()=>{
      saveAnfangBtn.disabled = true; saveAnfangBtn.textContent = 'Speichere …';
      const next = JSON.parse(JSON.stringify(state.anfangsbestand||{}));
      document.querySelectorAll('.anfang-input').forEach(inp=>{
        const bId = inp.dataset.betrieb, kat = inp.dataset.kat;
        if(!next[bId]) next[bId] = {};
        const datumInp = document.querySelector(`.anfang-datum-input[data-betrieb="${bId}"][data-kat="${kat}"]`);
        next[bId][kat] = { anzahl: parseInt(inp.value,10) || 0, datum: datumInp ? datumInp.value : '' };
      });
      try{
        await apiSet('anfangsbestand', next);
        state.anfangsbestand = next;
        toast('Anfangsbestand übernommen');
        saveAnfangBtn.disabled = false; saveAnfangBtn.textContent = 'Anfangsbestand übernehmen';
      }catch(err){
        saveAnfangBtn.disabled = false; saveAnfangBtn.textContent = 'Anfangsbestand übernehmen';
        toast('Speichern fehlgeschlagen', true);
      }
    });
  }
}

/* ============================================================
   START
   ============================================================ */
syncData(false, false);
</script>
</body>
</html>
